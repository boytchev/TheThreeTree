<!DOCTYPE html>
<html lang="en">

<head>
	<title>The Three Tree</title>
	<meta charset="utf-8">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;700&display=swap" rel="stylesheet">

	<script type="importmap">
	  {
		"imports": {
			"three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.webgpu.min.js",
			"three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.webgpu.min.js",
			"three/tsl": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.tsl.min.js",
			"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
		}
	  }
	</script>

	<style>
		body {
			overflow: hidden;
			margin: 0;
			font-weight: 700;
			font-family: Arial;
			background: gainsboro;
		}
		
		#loading {
			text-align: center;
			width: 100%;
			top: calc(48% - 3cm);
			color: white;
			position: absolute;
			z-index: 1000;
			text-shadow:
				-1px -1px 0px gray,
				1px -1px 0px gray,
				-1px 1px 0px gray,
				0px -1px 0px gray,
				0px 1px 1px gray,
				1px 2px 1px gray,
				1px 3px 1px gray,
				2px 4px 1px gray,
				2px 5px 1px gray,
				8px 18px 8px rgba(16,16,16,0.4),
				7px 22px 16px rgba(16,16,16,0.2),
				6px 25px 32px rgba(16,16,16,0.2),
				5px 30px 64px rgba(16,16,16,0.4);
			opacity: 1;
            transition: opacity 2s ease-out; 
			pointer-events: none;
		}
		
		big {
			display: block;
			font-size: 3cm;
			font-weight: 900;
		}
		
		small {
			margin: auto;
			display: inline-block;
			width: 80%;
			border-top: 1px dimgray solid;
			padding: 0.5em; 1em 0 1em !important;
			color: black;
			text-shadow: none;
			font-weight: 100;
			font-size: 1em;
		}
	</style>

	<script src="script.js" type="module"></script>
</head>

<body>
	<div id="loading">
		<big>THE THREE TREE</big>
		<small>
		The Digital Nervous System of Three.js r184
		</small>
	</div>
</body>
</html>
